services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - app-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - db-data:/app/backend
      - dossier-data:/app/backend/dossiers
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db-data:
  dossier-data:
