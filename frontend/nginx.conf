server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 301 redirect old nationality pages to consolidated location pages
    # e.g., /immigration-guide/diani/american → /immigration-guide/diani
    location ~ ^/immigration-guide/([^/]+)/([^/]+)$ {
        return 301 /immigration-guide/$1;
    }

    # 301 redirect legacy /nomad/ nationality pages
    location ~ ^/nomad/([^/]+)/([^/]+)$ {
        return 301 /immigration-guide/$1;
    }

    # Prerender.io — serves fully-rendered HTML to search engine bots
    # Sign up free at https://prerender.io and replace YOUR_TOKEN below
    set $prerender 0;
    if ($http_user_agent ~* "googlebot|bingbot|yandex|baiduspider|twitterbot|facebookexternalhit|rogerbot|linkedinbot|embedly|quora link preview|showyoubot|outbrain|pinterest\/0\.|pinterestbot|slackbot|vkShare|W3C_Validator|whatsapp|redditbot|applebot|Discordbot|Semrushbot") {
        set $prerender 1;
    }
    if ($args ~ "_escaped_fragment_") {
        set $prerender 1;
    }
    if ($uri ~* "\.(js|css|xml|less|png|jpg|jpeg|gif|pdf|txt|ico|rss|zip|mp3|rar|exe|wmv|doc|avi|ppt|mpg|mpeg|tif|wav|mov|psd|ai|xls|mp4|m4a|swf|dat|dmg|iso|flv|m4v|torrent|ttf|woff|woff2|svg|eot)") {
        set $prerender 0;
    }

    # SPA fallback — serve prerendered HTML to bots, index.html to users
    location / {
        if ($prerender = 1) {
            rewrite (.*) /prerenderio last;
        }
        try_files $uri $uri/ /index.html;
    }

    # Prerender.io proxy — replace YOUR_TOKEN with your actual token
    location /prerenderio {
        if ($prerender = 0) {
            return 404;
        }
        proxy_set_header X-Prerender-Token HNLSNrXGNELxhznmJABV;
        proxy_set_header X-Prerender-Int-Type nginx;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "private, max-age=600, must-revalidate";

        # Resolve prerender.io address
        set $prerenderio_url "service.prerender.io";
        resolver 8.8.8.8;
        rewrite .* /$scheme://$host$request_uri? break;
        proxy_pass https://$prerenderio_url;
    }

    # Proxy API requests to the backend service
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
